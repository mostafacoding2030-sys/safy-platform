<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safy AI Platform</title>
    <style>
        :root {
            --primary-color: #00FF7F; /* أخضر ربيعي */
            --bg-color: #FFFFFF;
            --text-color: #333333;
            --sidebar-bg: #F4F7F6;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .btn-google {
            padding: 12px 24px; font-size: 16px; cursor: pointer;
            background-color: #4285F4; color: white; border: none; border-radius: 5px;
        }
        #main-app { display: none; width: 100%; height: 100%; }
        .sidebar {
            width: 250px; background-color: var(--sidebar-bg);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            border-left: 1px solid #E0E0E0;
        }
        .sidebar-item {
            padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background-color: var(--primary-color); color: white;
        }
        .content-area { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-signout { background: #FF4D4D; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2>مرحباً بك في منصة Safy</h2>
        <button class="btn-google" onclick="login()">تسجيل الدخول عبر Google</button>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <h3>منصة Safy</h3>
            <div class="sidebar-item active" onclick="switchTab('chat')">Chat with Safy</div>
            <div class="sidebar-item" onclick="switchTab('photo')">Photo Maker</div>
            <div class="sidebar-item" onclick="switchTab('video')">Video Maker</div>
            <div class="sidebar-item" onclick="switchTab('game')">Game Maker</div>
        </div>
        <div class="content-area">
            <div class="top-bar">
                <button class="btn-signout" onclick="logout()">تسجيل الخروج</button>
                <div>⚙️ الإعدادات</div>
            </div>
            <div id="tab-content">
                <h2>اسأل Safy / Chat with Safy</h2>
                <p>مرحباً بك! اكتب سؤالك هنا وسيجيبك الذكاء الاصطناعي.</p>
            </div>
        </div>
    </div>

    <script>
        function login() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }
        function logout() {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
        function switchTab(tab) {
            const content = document.getElementById('tab-content');
            if(tab === 'chat') {
                content.innerHTML = `<h2>Ask Safy</h2><p>اكتب سؤالك لشات Safy الذكي...</p>`;
            } else if(tab === 'photo') {
                content.innerHTML = `<h2>Photo Maker</h2><p>توليد وتعديل الصور بدقة واقعية، انمي، ولوجو...</p>`;
            } else if(tab === 'video') {
                content.innerHTML = `<h2>Video Maker</h2><p>توليد فيديوهات حتى 3 ساعات باستخدام Unreal Engine...</p>`;
            } else if(tab === 'game') {
                content.innerHTML = `<h2>Game Maker</h2><p>اصنع لعبتك وحملها بصيغة APK...</p>`;
            }
        }
    </script>
</body>
</html>
